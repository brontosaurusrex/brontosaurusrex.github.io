<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Commander</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #2a2a2a;
            font-family: 'Segoe UI', 'Consolas', monospace;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .commander {
            max-width: 1000px;
            margin: 0 auto;
        }
        .dual-panels {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .board-panel {
            background: transparent;
            padding: 0;
            position: relative;
        }
        /* Turn indicator character */
        .board-panel .turn-indicator {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            padding: 2px 8px;
            background: transparent;
            color: #888;
            font-family: monospace;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .board-panel.active-turn .turn-indicator {
            opacity: 1;
            color: #4a8c4a;
        }
        .board-container {
            width: 560px;
            height: 560px;
        }
        .analysis-hub {
            background: transparent;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            max-width: 1000px;
        }
        .eval-section {
            flex: 2;
            min-width: 200px;
        }
        .eval-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        .eval-meter-bg {
            background: #333;
            height: 20px;
            position: relative;
        }
        .eval-fill {
            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            background: #6b8c6b;
        }
        .eval-numeric {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            background: #111;
            display: inline-block;
            padding: 2px 10px;
            margin-top: 5px;
            color: #6b8c6b;
        }
        .bestmove-section {
            flex: 3;
        }
        .bestmove-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        .bestmove-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bestmove-algebraic {
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            background: #111;
            display: inline-block;
            padding: 4px 15px;
            color: #deb887;
            cursor: pointer;
        }
        .bestmove-algebraic:hover {
            background: #222;
        }
        .play-best-move {
            background: #3a5a3a;
            border: none;
            color: white;
            padding: 4px 12px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
        }
        .play-best-move:hover {
            background: #4a6a4a;
        }
        button {
            background: #333;
            border: none;
            color: #ddd;
            padding: 6px 16px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }
        button:hover {
            background: #444;
        }
        .engine-status {
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
        .footer-info {
            text-align: center;
            font-size: 10px;
            color: #666;
            margin-top: 15px;
        }
        .highlight-from {
            box-shadow: inset 0 0 0 3px #4a8c4a;
        }
        .highlight-to {
            box-shadow: inset 0 0 0 3px #8c6b4a;
        }
        @media (max-width: 1050px) {
            .board-container { width: 380px; height: 380px; }
            .board-panel .turn-indicator { top: -18px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="commander">
    <div class="dual-panels">
        <div class="board-panel" id="panelBlack">
            <div class="turn-indicator">▼</div>
            <div id="boardBlackContainer" class="board-container"></div>
        </div>
        <div class="board-panel" id="panelWhite">
            <div class="turn-indicator">▼</div>
            <div id="boardWhiteContainer" class="board-container"></div>
        </div>
    </div>

    <div class="analysis-hub">
        <div class="eval-section">
            <div class="eval-label">STOCKFISH EVAL</div>
            <div class="eval-meter-bg">
                <div id="evalFillBar" class="eval-fill" style="left:50%; width:0%"></div>
            </div>
            <div id="evalText" class="eval-numeric">0.00</div>
        </div>
        <div class="bestmove-section">
            <div class="bestmove-title">BEST MOVE</div>
            <div class="bestmove-wrapper">
                <div id="bestMoveDisplay" class="bestmove-algebraic">—</div>
                <button id="playBestMoveBtn" class="play-best-move" style="display:none;">PLAY</button>
            </div>
        </div>
        <button id="resetGameBtn">RESET</button>
        <div class="engine-status" id="engineStatus">initializing...</div>
    </div>
    <div class="footer-info">
        drag on either board | indicator shows whose turn it is
    </div>
</div>

<script>
    const localPiecePath = 'img/chesspieces/wikipedia/{piece}.png';
    const cdnPiecePath = 'https://raw.githubusercontent.com/ornicar/chessboard-image/master/img/chesspieces/wikipedia/{piece}.png';
    let activePiecePath = localPiecePath;
    
    async function verifyLocalPieces() {
        const pieces = ['wP', 'wN', 'wB', 'wR', 'wQ', 'wK', 'bP', 'bN', 'bB', 'bR', 'bQ', 'bK'];
        for (const piece of pieces) {
            const url = localPiecePath.replace('{piece}', piece);
            try {
                const response = await fetch(url, { method: 'HEAD' });
                if (!response.ok) {
                    activePiecePath = cdnPiecePath;
                    return;
                }
            } catch(e) {
                activePiecePath = cdnPiecePath;
                return;
            }
        }
        console.log('using local pieces');
    }
    
    let stockfishWorker = null;
    let isEngineReady = false;
    let currentGame = new Chess();
    let boardWhite = null, boardBlack = null;
    let currentBestMoveUCI = null;
    let analysisTimeout = null;
    
    function updateTurnIndicator() {
        const isWhiteTurn = currentGame.turn() === 'w';
        const panelWhite = document.getElementById('panelWhite');
        const panelBlack = document.getElementById('panelBlack');
        
        if (isWhiteTurn) {
            panelWhite.classList.add('active-turn');
            panelBlack.classList.remove('active-turn');
        } else {
            panelBlack.classList.add('active-turn');
            panelWhite.classList.remove('active-turn');
        }
    }
    
    async function initStockfish() {
        try {
            document.getElementById('engineStatus').innerText = 'loading stockfish...';
            const response = await fetch('https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js');
            const scriptText = await response.text();
            const blob = new Blob([scriptText], { type: 'application/javascript' });
            const blobUrl = URL.createObjectURL(blob);
            stockfishWorker = new Worker(blobUrl);
            URL.revokeObjectURL(blobUrl);
            
            stockfishWorker.onmessage = function(event) {
                const line = event.data;
                
                if (line.includes('id name')) {
                    document.getElementById('engineStatus').innerText = 'ready';
                    isEngineReady = true;
                    sendPositionToStockfish();
                }
                
                if (line.includes('bestmove')) {
                    const match = line.match(/bestmove\s+(\S+)/);
                    if (match && match[1] && match[1] !== '(none)') {
                        displayBestMoveAlgebraic(match[1]);
                        highlightBestMoveOnBoards(match[1]);
                        document.getElementById('playBestMoveBtn').style.display = 'inline-block';
                    }
                }
                
                if (line.includes('info') && line.includes('cp')) {
                    const cpMatch = line.match(/cp\s+(-?\d+)/);
                    if (cpMatch) {
                        const cp = parseInt(cpMatch[1]) / 100;
                        updateEvaluationDisplay(cp);
                    }
                }
                
                if (line.includes('info') && line.includes('pv') && !currentBestMoveUCI) {
                    const pvMatch = line.match(/pv\s+(\S+)/);
                    if (pvMatch && pvMatch[1]) {
                        displayBestMoveAlgebraic(pvMatch[1]);
                        highlightBestMoveOnBoards(pvMatch[1]);
                        document.getElementById('playBestMoveBtn').style.display = 'inline-block';
                    }
                }
            };
            
            stockfishWorker.postMessage('uci');
            setTimeout(() => stockfishWorker.postMessage('isready'), 100);
        } catch (err) {
            document.getElementById('engineStatus').innerText = 'engine error';
            useFallbackEvaluation();
        }
    }
    
    function sendPositionToStockfish() {
        if (!stockfishWorker || !isEngineReady) return;
        stockfishWorker.postMessage('stop');
        stockfishWorker.postMessage(`position fen ${currentGame.fen()}`);
        stockfishWorker.postMessage('go depth 14');
        document.getElementById('engineStatus').innerText = 'analyzing...';
        setTimeout(() => {
            if (isEngineReady) document.getElementById('engineStatus').innerText = 'ready';
        }, 1000);
    }
    
    function scheduleAnalysis() {
        if (analysisTimeout) clearTimeout(analysisTimeout);
        analysisTimeout = setTimeout(() => {
            if (stockfishWorker && isEngineReady) sendPositionToStockfish();
        }, 200);
    }
    
    function useFallbackEvaluation() {
        function evaluatePosition() {
            const values = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
            let score = 0;
            const board = currentGame.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = board[i][j];
                    if (piece) {
                        let v = values[piece.type];
                        if (piece.color === 'b') v = -v;
                        score += v;
                    }
                }
            }
            return score;
        }
        setInterval(() => {
            if (currentGame) {
                updateEvaluationDisplay(evaluatePosition());
                const moves = currentGame.moves({ verbose: true });
                if (moves.length > 0 && !currentBestMoveUCI) {
                    const randomMove = moves[Math.floor(Math.random() * moves.length)];
                    displayBestMoveAlgebraic(randomMove.from + randomMove.to);
                    highlightBestMoveOnBoards(randomMove.from + randomMove.to);
                }
            }
        }, 1000);
    }
    
    function updateEvaluationDisplay(cpValue) {
        const fillBar = document.getElementById('evalFillBar');
        let percentage = 0;
        let leftPos = 50;
        
        if (cpValue > 0) {
            percentage = Math.min(cpValue, 10) / 10 * 45;
            leftPos = 50;
        } else if (cpValue < 0) {
            percentage = Math.min(-cpValue, 10) / 10 * 45;
            leftPos = 50 - percentage;
        } else {
            percentage = 0;
            leftPos = 50;
        }
        
        fillBar.style.left = leftPos + '%';
        fillBar.style.width = percentage + '%';
        
        let text = cpValue > 0 ? `+${cpValue.toFixed(2)}` : cpValue.toFixed(2);
        document.getElementById('evalText').innerText = text;
    }
    
    function uciToAlgebraic(uci) {
        if (!uci || uci.length < 4) return '?';
        try {
            const from = uci.substring(0,2);
            const to = uci.substring(2,4);
            const move = currentGame.moves({ verbose: true }).find(m => m.from === from && m.to === to);
            return move ? move.san : uci;
        } catch(e) { return uci; }
    }
    
    function displayBestMoveAlgebraic(uciMove) {
        if (!uciMove) return;
        document.getElementById('bestMoveDisplay').innerHTML = uciToAlgebraic(uciMove);
        currentBestMoveUCI = uciMove;
    }
    
    function playBestMove() {
        if (!currentBestMoveUCI) return;
        const from = currentBestMoveUCI.substring(0,2);
        const to = currentBestMoveUCI.substring(2,4);
        const move = currentGame.move({ from: from, to: to, promotion: 'q' });
        if (move) {
            currentBestMoveUCI = null;
            document.getElementById('bestMoveDisplay').innerHTML = '—';
            document.getElementById('playBestMoveBtn').style.display = 'none';
            syncBoardsFromGame(true);
            updateTurnIndicator();
        }
    }
    
    function highlightBestMoveOnBoards(uciMove) {
        if (!uciMove || uciMove.length < 4) return;
        const fromSquare = uciMove.substring(0,2);
        const toSquare = uciMove.substring(2,4);
        [boardWhite, boardBlack].forEach(board => {
            if (!board || !board.el) return;
            $(`#${board.el.id} .square-55d63`).removeClass('highlight-from highlight-to');
            $(`#${board.el.id} .square-${fromSquare}`).addClass('highlight-from');
            $(`#${board.el.id} .square-${toSquare}`).addClass('highlight-to');
        });
    }
    
    function clearHighlights() {
        [boardWhite, boardBlack].forEach(board => {
            if(board && board.el) {
                $(`#${board.el.id} .square-55d63`).removeClass('highlight-from highlight-to');
            }
        });
    }
    
    function syncBoardsFromGame(fromEngineMove = false) {
        const fen = currentGame.fen();
        
        const lastMove = currentGame.history({ verbose: true }).slice(-1)[0];
        
        if (lastMove && !fromEngineMove) {
            const draggingBoard = lastMove.color === 'w' ? boardWhite : boardBlack;
            const opponentBoard = lastMove.color === 'w' ? boardBlack : boardWhite;
            
            if (draggingBoard) {
                draggingBoard.position(fen, false);
            }
            
            if (opponentBoard) {
                opponentBoard.position(fen, true);
            }
        } else {
            if (boardWhite) boardWhite.position(fen);
            if (boardBlack) boardBlack.position(fen);
        }
        
        if (currentBestMoveUCI) {
            highlightBestMoveOnBoards(currentBestMoveUCI);
        } else {
            clearHighlights();
        }
        scheduleAnalysis();
    }
    
    function onMoveHandler(source, target, piece, newPos, oldPos, orientation) {
        const move = currentGame.move({ from: source, to: target, promotion: 'q' });
        
        if (move === null) {
            return false;
        }
        
        currentBestMoveUCI = null;
        document.getElementById('bestMoveDisplay').innerHTML = '—';
        document.getElementById('playBestMoveBtn').style.display = 'none';
        
        const isWhiteBoard = orientation === 'white';
        const movingBoard = isWhiteBoard ? boardWhite : boardBlack;
        const opponentBoard = isWhiteBoard ? boardBlack : boardWhite;
        
        const fen = currentGame.fen();
        
        if (movingBoard) {
            movingBoard.position(fen, false);
        }
        
        if (opponentBoard) {
            opponentBoard.position(fen, true);
        }
        
        updateTurnIndicator();
        scheduleAnalysis();
        return true;
    }
    
    function resetGame() {
        currentGame = new Chess();
        currentBestMoveUCI = null;
        document.getElementById('bestMoveDisplay').innerHTML = '—';
        document.getElementById('playBestMoveBtn').style.display = 'none';
        
        const fen = currentGame.fen();
        if (boardWhite) boardWhite.position(fen);
        if (boardBlack) boardBlack.position(fen);
        
        clearHighlights();
        updateEvaluationDisplay(0);
        updateTurnIndicator();
        if (stockfishWorker && isEngineReady) sendPositionToStockfish();
    }
    
    async function initBoards() {
        await verifyLocalPieces();
        boardWhite = Chessboard('boardWhiteContainer', {
            draggable: true,
            position: 'start',
            pieceTheme: activePiecePath,
            onDrop: onMoveHandler,
            onDragStart: function(source, piece) {
                const isWhiteTurn = currentGame.turn() === 'w';
                const isDraggingWhite = piece[0] === 'w';
                return (isWhiteTurn && isDraggingWhite) || (!isWhiteTurn && !isDraggingWhite);
            }
        });
        boardBlack = Chessboard('boardBlackContainer', {
            draggable: true,
            position: 'start',
            orientation: 'black',
            pieceTheme: activePiecePath,
            onDrop: onMoveHandler,
            onDragStart: function(source, piece) {
                const isWhiteTurn = currentGame.turn() === 'w';
                const isDraggingWhite = piece[0] === 'w';
                return (isWhiteTurn && isDraggingWhite) || (!isWhiteTurn && !isDraggingWhite);
            }
        });
        
        const fen = currentGame.fen();
        if (boardWhite) boardWhite.position(fen);
        if (boardBlack) boardBlack.position(fen);
        updateTurnIndicator();
        scheduleAnalysis();
    }
    
    $(document).ready(function() {
        initBoards();
        initStockfish();
        $('#resetGameBtn').on('click', resetGame);
        $('#playBestMoveBtn').on('click', playBestMove);
        $('#bestMoveDisplay').on('click', function() {
            if (currentBestMoveUCI) playBestMove();
        });
    });
</script>
</body>
</html>
